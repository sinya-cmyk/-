<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ログ閲覧</title>
  <style>
    body{
      font-family:system-ui, -apple-system, "Yu Gothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      padding:16px;
      color:#111;
      background:#f3f6fb;
    }
    header{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      margin-bottom:20px;
    }
    h1{font-size:1.8rem; margin:0; color:#0d4c92;}
    button{padding:8px 12px; border:none; background:#0d4c92; color:white; border-radius:6px; cursor:pointer;}
    button:hover{background:#08417b;}
    .logs{display:grid; gap:16px;}
    .panel{background:#fff; border:1px solid #dde5ef; border-radius:16px; padding:18px; box-shadow:0 10px 30px rgba(15,23,42,0.06);}
    .panel h2{margin-top:0; margin-bottom:14px; color:#0d4c92;}
    .entry{background:#f8fbff; border:1px solid #e2eaf6; border-radius:14px; padding:16px; margin-bottom:14px; display:flex; justify-content:space-between; gap:16px;}
    .entry:last-child{margin-bottom:0;}
    .entry-body{flex:1;}
    .entry-title{font-weight:700; margin:0 0 6px 0; color:#102a43;}
    .entry-text{margin:0; line-height:1.6; color:#243b53;}
    .entry-meta{font-size:13px; color:#627d98;}
    .entry-time{min-width:146px; text-align:right; font-size:13px; color:#475569;}
    .empty-state{padding:18px; color:#334e68;}
    a.button-link{display:inline-flex; align-items:center; gap:6px; background:#fff; color:#0d4c92; border:1px solid #0d4c92;}
  </style>
</head>
<body>
  <header>
    <h1>操作ログ</h1>
    <button id="refresh">更新</button>
    <a href="app.html"><button>戻る</button></a>
  </header>

  <div class="logs">
    <div class="panel">
      <h2>操作ログ一覧</h2>
      <div id="serverLogs"></div>
    </div>
  </div>

  <script>
    const serverContainer = document.getElementById('serverLogs');
    const origin = window.location.origin;
    const serverBase = origin && origin !== 'null' ? origin : 'http://localhost:8000';
    async function loadServerLogs(){
      serverContainer.innerHTML = '<p class="empty-state">読み込み中...</p>';
      if (origin === 'null' || window.location.protocol === 'file:') {
        serverContainer.innerHTML = '<p class="empty-state">このページはローカルファイルとして開かれています。<br>ログを確認するには <a href="http://localhost:8000/logs.html">http://localhost:8000/logs.html</a> から開いてください。</p>';
        return;
      }
      try{
        const url = `${serverBase}/api/logs`;
        console.log('リクエストURL:', url);
        const res = await fetch(url);
        console.log('レスポンスステータス:', res.status, res.statusText);
        if(!res.ok) {
          const text = await res.text();
          console.error('エラーレスポンス:', text);
          if (res.status === 404) {
            return loadLocalLogs('API が見つかりませんでした。logs.jsonl からログを読み込みます。');
          }
          throw new Error(`status:${res.status} - ${res.statusText}`);
        }
        const items = await res.json();
        if(items.length===0){ serverContainer.innerHTML = '<p class="empty-state">ログはありません。</p>'; return; }
        const sorted = items.slice().sort((a,b)=>new Date(b.timestamp) - new Date(a.timestamp));
        serverContainer.innerHTML = sorted.map(formatLogEntry).join('');
      }catch(e){
        console.error('loadServerLogs error', e);
        serverContainer.innerHTML = `<p class="empty-state">取得に失敗しました。サーバが起動しているか確認してください。<br>エラー: ${escapeHtml(e.message)}</p>`;
      }
    }

    async function loadLocalLogs(message) {
      serverContainer.innerHTML = `<p class="empty-state">${escapeHtml(message)}</p>`;
      try {
        const res = await fetch('logs.jsonl');
        if (!res.ok) {
          throw new Error(`logs.jsonl の取得に失敗しました: ${res.status} ${res.statusText}`);
        }
        const text = await res.text();
        const items = parseJsonl(text);
        if (items.length === 0) {
          serverContainer.innerHTML = '<p class="empty-state">ログはありません。</p>';
          return;
        }
        const sorted = items.slice().sort((a,b)=>new Date(b.timestamp) - new Date(a.timestamp));
        serverContainer.innerHTML = sorted.map(formatLogEntry).join('');
      } catch (e) {
        console.error('loadLocalLogs error', e);
        serverContainer.innerHTML = `<p class="empty-state">ログ取得に失敗しました。<br>エラー: ${escapeHtml(e.message)}</p>`;
      }
    }

    function parseJsonl(text) {
      return text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line.length > 0)
        .map((line) => {
          try {
            return JSON.parse(line);
          } catch {
            return null;
          }
        })
        .filter(Boolean);
    }

    function formatLogEntry(entry){
      const timestamp = formatDate(entry.timestamp);
      const user = entry.user || '不明なユーザー';
      const action = entry.action || 'unknown';
      const task = entry.payload?.task || entry.payload?.after || entry.payload?.before || {};
      const title = task.title || task.name || '（タイトルなし）';
      const date = task.date || entry.payload?.date || '';
      const start = task.startTime || '';
      const end = task.endTime || '';
      const when = formatSchedule(date, start, end);
      const device = formatDevice(entry.payload?.device);
      const message = buildMessage(action, title, when, task, entry);
      const actionLabel = {
        add: '予定を追加',
        update: '予定を更新',
        delete: '予定を削除'
      }[action] || '操作';
      return `
        <div class="entry">
          <div class="entry-body">
            <p class="entry-title">${escapeHtml(actionLabel)}</p>
            <p class="entry-text">${escapeHtml(message)}</p>
            <p class="entry-meta">${escapeHtml(user)} / ${escapeHtml(device)}</p>
          </div>
          <div class="entry-time">${escapeHtml(timestamp)}</div>
        </div>
      `;
    }

    function buildMessage(action, title, when, task, entry){
      switch(action){
        case 'add':
          return `予定「${title}」を${when}で追加しました。`;
        case 'update':
          return `予定「${title}」を${when}で更新しました。`;
        case 'delete':
          return `予定「${title}」を${when}で削除しました。`;
        default:
          return `ユーザー「${entry.user || '不明'}」が操作「${action}」を実行しました。`;
      }
    }

    function formatSchedule(date, start, end){
      if(!date) return '日時不明';
      const formattedDate = date.replace(/-/g,'/');
      if(start && end){
        return `${formattedDate} ${start} - ${end}`;
      }
      if(start){
        return `${formattedDate} ${start}`;
      }
      return formattedDate;
    }

    function formatDate(value){
      if(!value) return '';
      const date = new Date(value);
      if(Number.isNaN(date.getTime())) return value;
      return `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:${String(date.getSeconds()).padStart(2,'0')}`;
    }

    function formatDevice(device){
      if(!device) return '端末情報なし';
      return device;
    }

    function escapeHtml(text){
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('refresh').addEventListener('click',()=>{ loadServerLogs(); });

    // 初期読み込み
    loadServerLogs();
  </script>
</body>
</html>
